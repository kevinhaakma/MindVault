name: "MindVault"
description: >
  Vex — persistent memory + knowledge graph for code agents.
  Stores memories in SQLite + vector embeddings, visualizes them as a constellation.
  Exposes recall/remember/get_secret via MCP for Claude Code and other agents.
version: "0.1.34"
slug: "mindvault"
url: "https://github.com/kevinhaakma/mindvault"
init: false

# "Open Web UI" button in HA add-on page → opens MindVault directly (bypasses ingress)
webui: "http://[HOST]:[PORT:8765]/"

# Sidebar panel entry
panel_icon: "mdi:graph-outline"
panel_title: "MindVault"
panel_admin: true

# Tell Supervisor to build from repo root so the Dockerfile can COPY gui/ and backend/
# (HA Supervisor uses the add-on directory as context by default; this overrides it)
build: true

arch:
  - aarch64
  - amd64

startup: application
boot: auto

# Lets MindVault call supervisor API (used by /api/supervisor/* passthrough)
hassio_api: true
hassio_role: manager

# port 80  → GUI  (nginx, mapped to host 7653)
# port 8765 → API  (uvicorn, mapped to host 8765 for MCP clients)
ports:
  8765/tcp: 8765

ports_description:
  8765/tcp: "MindVault GUI + API"

map:
  - data:rw

options:
  password: ""
schema:
  password: password?
